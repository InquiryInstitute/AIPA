<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Graph Explorer</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1rem; }
    header { margin-bottom: 1rem; }
    .toolbar { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
    input[type="text"] { padding: 0.5rem; min-width: 200px; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    #graph-viz { width: 100%; height: 400px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; background: #f9f9f9; }
    #results { margin-top: 1rem; padding: 1rem; border: 1px solid #ddd; background: #fff; min-height: 100px; }
    .node { fill: #4a90d9; stroke: #2c5aa0; }
  </style>
</head>
<body>
  <header>
    <h1>Knowledge Graph Explorer</h1>
    <p>Ch1 Lab 3 reference fixture for Playwright trace</p>
  </header>

  <div class="toolbar">
    <input type="text" id="query-input" data-testid="query-input" placeholder="Enter query (e.g., author:Smith)">
    <button id="query-submit" data-testid="query-submit">Query</button>
  </div>

  <div id="graph-viz" data-testid="graph-viz">
    <svg width="100%" height="100%" viewBox="0 0 400 300">
      <circle class="node" cx="100" cy="150" r="20" data-node="A"/>
      <circle class="node" cx="200" cy="100" r="20" data-node="B"/>
      <circle class="node" cx="200" cy="200" r="20" data-node="C"/>
      <circle class="node" cx="300" cy="150" r="20" data-node="D"/>
      <line x1="120" y1="150" x2="180" y2="110" stroke="#333"/>
      <line x1="120" y1="150" x2="180" y2="190" stroke="#333"/>
      <line x1="220" y1="100" x2="280" y2="150" stroke="#333"/>
      <line x1="220" y1="200" x2="280" y2="150" stroke="#333"/>
    </svg>
  </div>

  <div id="results" data-testid="results">
    <p>Results will appear here. Run a query to see matches.</p>
  </div>

  <script>
    const queryInput = document.getElementById('query-input');
    const querySubmit = document.getElementById('query-submit');
    const results = document.getElementById('results');

    querySubmit.addEventListener('click', () => {
      const q = queryInput.value.trim() || 'author:Smith';
      results.innerHTML = `<p>Query: <strong>${q}</strong></p><ul><li>Paper 1 (Smith et al., 2023)</li><li>Paper 2 (Smith, 2022)</li></ul>`;
    });
  </script>
</body>
</html>
